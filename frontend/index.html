<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片处理</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        background: #fff;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }

    /* 上半部分 — 上传预览 */
    .section {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        min-height: 0;
    }

    .section-title {
        font-size: 14px;
        color: #999;
        margin-bottom: 12px;
        font-weight: 500;
        letter-spacing: 1px;
    }

    .image-wrapper {
        width: 100%;
        max-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        overflow: hidden;
        background: #fafafa;
        border: 2px dashed #e0e0e0;
        aspect-ratio: 4/3;
    }

    .image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .placeholder {
        color: #ccc;
        font-size: 14px;
        text-align: center;
    }

    .placeholder .icon {
        font-size: 48px;
        display: block;
        margin-bottom: 8px;
    }

    /* 分割线 */
    .divider {
        height: 1px;
        background: #eee;
        margin: 0 16px;
        position: relative;
    }

    .divider::after {
        content: "↓";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 0 12px;
        color: #ccc;
        font-size: 14px;
    }

    /* 按钮区域 */
    .actions {
        display: flex;
        gap: 12px;
        padding: 16px;
    }

    .btn {
        flex: 1;
        padding: 14px 0;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .btn:active {
        transform: scale(0.96);
    }

    .btn-upload {
        background: #4a90d9;
        color: #fff;
    }

    .btn-upload:disabled {
        background: #b0cee8;
        cursor: not-allowed;
    }

    .btn-submit {
        background: #34c759;
        color: #fff;
    }

    .btn-submit:disabled {
        background: #a8e6b8;
        cursor: not-allowed;
    }

    /* 加载动画 */
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
    }

    .loading-overlay.hidden {
        display: none;
    }

    .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e0e0e0;
        border-top-color: #4a90d9;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 10px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .loading-text {
        font-size: 13px;
        color: #999;
    }

    /* Toast 提示 */
    .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #fff;
        padding: 10px 24px;
        border-radius: 20px;
        font-size: 14px;
        z-index: 999;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
    }

    /* ---- 结果卡片 ---- */
    .result-card {
        margin: 0 16px 16px;
        border-radius: 12px;
        overflow: hidden;
        background: #fafafa;
        border: 1px solid #eee;
    }

    .result-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: #f5f5f5;
        font-size: 13px;
        color: #666;
    }

    .btn-download {
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        background: #4a90d9;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
    }

    .btn-download:active { transform: scale(0.95); }

    .result-card img {
        width: 100%;
        display: block;
    }

    .result-card.placeholder-card {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #ccc;
        font-size: 14px;
    }

    /* ---- 进度条 ---- */
    .progress-bar {
        margin: 0 16px 8px;
        height: 4px;
        background: #eee;
        border-radius: 2px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        background: #34c759;
        transition: width 0.3s;
        width: 0%;
    }
</style>
</head>
<body>

<div class="container">
    <!-- 上传预览区（上半部分） -->
    <div class="section" id="uploadSection">
        <div class="section-title">📤 上传预览</div>
        <div class="image-wrapper" id="uploadWrapper">
            <div class="placeholder" id="uploadPlaceholder">
                <span class="icon">🖼️</span>
                点击下方按钮上传图片
            </div>
            <img id="uploadPreview" src="" alt="上传预览" style="display:none;">
        </div>
    </div>

    <!-- 按钮区 -->
    <div class="actions">
        <button class="btn btn-upload" id="btnUpload" onclick="document.getElementById('fileInput').click()">
            📁 上传图片
        </button>
        <button class="btn btn-submit" id="btnSubmit" onclick="submitImage()" disabled>
            🚀 提交处理
        </button>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">

    <!-- 分割线 -->
    <div class="divider" id="dividerStep"></div>

    <!-- 处理状态 -->
    <div id="statusBar" class="result-card placeholder-card" style="margin-top:16px;">
        🔄 等待提交...
    </div>

    <!-- 动态结果区（JS 填充） -->
    <div id="resultsArea"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    let selectedFile = null;
    let pollTimer = null;
    let taskStartTime = null;
    let lastResultCount = 0;

    // 选择图片
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById("uploadPreview");
            img.src = e.target.result;
            img.style.display = "block";
            document.getElementById("uploadPlaceholder").style.display = "none";
            document.getElementById("btnSubmit").disabled = false;
        };
        reader.readAsDataURL(file);
    }

    // 提交任务
    async function submitImage() {
        if (!selectedFile) { showToast("请先上传图片"); return; }
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

        const btnSubmit = document.getElementById("btnSubmit");
        btnSubmit.disabled = true;
        btnSubmit.textContent = "⏳ 提交中...";
        document.getElementById("resultsArea").innerHTML = "";
        document.getElementById("statusBar").innerHTML = "⏳ 正在提交...";
        lastResultCount = 0;

        try {
            const formData = new FormData();
            formData.append("image", selectedFile);
            const response = await fetch("/api/process", { method: "POST", body: formData });
            if (!response.ok) {
                const err = await response.json().catch(() => ({ error: "提交失败" }));
                throw new Error(err.error);
            }
            const data = await response.json();
            showToast("✅ 任务已提交");
            taskStartTime = Date.now();
            startPolling(data.task_id);
        } catch (err) {
            showToast("❌ " + err.message);
            document.getElementById("statusBar").innerHTML = "❌ " + err.message;
            btnSubmit.disabled = false;
            btnSubmit.textContent = "🚀 提交处理";
        }
    }

    // 轮询状态 + 增量拉取结果
    function startPolling(taskId) {
        const statusBar = document.getElementById("statusBar");

        pollTimer = setInterval(async () => {
            try {
                const resp = await fetch("/api/status/" + taskId);
                if (!resp.ok) throw new Error("查询失败");
                const data = await resp.json();
                const elapsed = Math.floor((Date.now() - taskStartTime) / 1000);
                const mins = Math.floor(elapsed / 60), secs = elapsed % 60;
                const t = (v) => String(v).padStart(2, '0');

                // 更新状态栏
                if (data.status === "queued") {
                    statusBar.innerHTML = `⏳ 排队中… 位置 #${data.queue_position} | ${t(mins)}:${t(secs)}`;
                } else if (data.status === "processing") {
                    const phaseText = { "loading":"加载图片…", "detecting":"SAM3 检测纸框…",
                        "annotating":"绘制四边形标注…", "extracting":"提取拍立得…" }[data.phase] || "处理中…";
                    statusBar.innerHTML = `🔄 ${phaseText} | ${t(mins)}:${t(secs)}`;
                } else if (data.status === "done") {
                    statusBar.innerHTML = `✅ 完成！共 ${data.total_polaroids} 张 | 耗时 ${data.elapsed.toFixed(1)}s | 正在下载...`;
                    clearInterval(pollTimer); pollTimer = null;
                    document.getElementById("btnSubmit").disabled = false;
                    document.getElementById("btnSubmit").textContent = "🚀 提交处理";
                } else if (data.status === "failed") {
                    statusBar.innerHTML = `❌ ${data.error || "处理失败"}`;
                    clearInterval(pollTimer); pollTimer = null;
                    document.getElementById("btnSubmit").disabled = false;
                    document.getElementById("btnSubmit").textContent = "🚀 提交处理";
                }

                // 增量获取新结果
                if (data.results && data.results.length > lastResultCount) {
                    for (let i = lastResultCount; i < data.results.length; i++) {
                        await fetchAndShowResult(taskId, data.results[i]);
                    }
                    lastResultCount = data.results.length;
                }
            } catch (err) {
                statusBar.innerHTML = "⚠️ 连接中断，正在重试…";
            }
        }, 1500);
    }

    async function fetchAndShowResult(taskId, resultMeta) {
        try {
            const resp = await fetch(`/api/result/${taskId}/${resultMeta.id}`);
            if (!resp.ok) return;
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            addResultCard(resultMeta.label, url, resultMeta.type);
        } catch (e) { /* 忽略 */ }
    }

    function addResultCard(label, imageUrl, type) {
        const area = document.getElementById("resultsArea");
        const isAnnotated = type === "annotated";

        const card = document.createElement("div");
        card.className = "result-card";

        const header = document.createElement("div");
        header.className = "result-card-header";
        header.innerHTML = `<span>${isAnnotated ? "📐" : "📸"} ${label}</span>`;

        const downloadBtn = document.createElement("button");
        downloadBtn.className = "btn-download";
        downloadBtn.textContent = "⬇ 下载";
        downloadBtn.onclick = () => {
            const a = document.createElement("a");
            a.href = imageUrl;
            a.download = label.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, "_") + ".png";
            a.click();
        };
        header.appendChild(downloadBtn);

        const img = document.createElement("img");
        img.src = imageUrl;
        img.alt = label;

        card.appendChild(header);
        card.appendChild(img);
        area.appendChild(card);

        // 滚动到最新
        card.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove("show"), 3000);
    }
</script>

</body>
</html>
